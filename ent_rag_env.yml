# ENT RAG environment rebuilt for OpenAI-API RAGAS evaluation.
# Distribution-focused top-level list: intentionally excludes transitive dependencies.
#
# System prerequisite on Ubuntu/WSL when using Python 3.14 and packages that may build wheels:
#   sudo apt update
#   sudo apt install -y build-essential
#
# This environment intentionally does NOT top-level install:
#   - kernels / kernels-data
#   - explicit triton
#   - langchain-huggingface
# These were only needed for the failed local GPT-OSS-20B RAGAS judge path.
#
# Note: torch may still install CUDA transitive packages automatically.

name: ent_rag

channels:
  - defaults

dependencies:
  - python=3.14.6
  - pip

  - pip:
      # Packaging tools
      - pip==26.1.2
      - setuptools==81.0.0
      - wheel==0.47.0

      # Local SLM / CLIP / encoder runtime
      - torch==2.12.1
      - torchvision==0.27.1
      - transformers==5.12.1          # SLM (Llama 3.2) and Image Encoder (CLIP)
      - accelerate==1.14.0            # Model Weight to System Hardware Distribution
      - sentence-transformers==5.6.0  # Text Encoder (BAAI/BGE)
      - faiss-cpu==1.14.3             # FAISS Indexing

      # Build-time PDF and semantic-chunking stack
      - pymupdf==1.27.2.3                         # Iterate through the PDF and build the segments and image-extraction lookup
      - pillow==12.2.0                            # Opening images
      - llama-index-core==0.14.22                 # Semantic Chunking
      - llama-index-embeddings-huggingface==0.7.0 # Semantic Chunking with BAAI/bge tokens

      # Scientific, tabular, spreadsheet, and plotting stack
      - numpy==2.5.0
      - pandas==3.0.3
      - scipy==1.18.0
      - scikit-learn==1.9.0
      - matplotlib==3.11.0
      - seaborn==0.13.2
      - openpyxl==3.1.5

      # Runtime app and performance instrumentation
      - streamlit==1.58.0
      - python-dotenv==1.2.2
      - psutil==7.2.2
      - tqdm==4.68.3

      # Notebook environment
      - ipykernel==7.3.0
      - jupyter==1.1.1

      # RAGAS with OpenAI API judge
      - ragas==0.4.3
      - datasets==5.0.0
      - openai==2.43.0
      - tiktoken==0.13.0

      # LangChain compatibility cluster retained for RAGAS 0.4.3 import stability.
      - langchain==1.3.11
      - langchain-core==1.4.8
      - langchain-community==0.4.1 # Downgraded from 0.4.2. OpenAI-LLM RAGAS 0.4.3 has import-path issues with Langchain.vertex_ai
      - langchain-openai==1.3.3